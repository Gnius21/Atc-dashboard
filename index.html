<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ATC & WEATHER DASHBOARD — Curaçao</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>

<style>
:root{
  --accent:#3fa9f5;
  --accent-bright:#72c4ff;
  --accent-dim:#1a5a8a;
  --accent-glow:rgba(63,169,245,0.16);
  --cyan:#00d4ff;
  --bg:#000;
  --bg2:#03060d;
  --border:rgba(63,169,245,0.11);
  --border-hi:rgba(63,169,245,0.28);
  --text:#b8d0ec;
  --muted:#354e6a;
  --mono:'Share Tech Mono', monospace;
  --cond:'Barlow Condensed', sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{
  min-height:100%;
  background:#000;
  color:var(--text);
  font-family:var(--cond),system-ui,sans-serif;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
  height:52px;
  background:var(--bg2);
  border-bottom:1px solid var(--border-hi);
  font-weight:900;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--accent-bright);
}

/* LOCK */
.toggle-container{
  position:fixed;
  top:12px;
  right:14px;
  z-index:12000;
  display:flex;
  align-items:center;
  gap:8px;
  padding:7px 13px;
  background:var(--bg2);
  border:1px solid var(--border-hi);
  border-radius:4px;
  font-family:var(--cond);
  font-size:.76rem;
  font-weight:700;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--accent-bright);
  cursor:pointer;
}

.lock-led{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--accent);
}

.lock-led.unlocked{
  background:var(--cyan);
}

/* BUTTONS */
.btn{
  display:inline-flex;
  align-items:center;
  font-family:var(--cond);
  font-size:.8rem;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--accent-bright);
  border:1px solid var(--border-hi);
  background:var(--accent-glow);
  padding:8px 14px;
  text-decoration:none;
}

/* LAYOUT */
.layout{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:12px;
  padding:10px 16px 28px;
}

.full{grid-column:1/-1}
.col-6{grid-column:span 6}

/* RADAR */
.radar-box{
  position:relative;
  width:100%;
  height:360px;
  border:1px solid var(--border-hi);
  border-radius:6px;
  overflow:hidden;
  background:#000;
}

.radar-box iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
}

.overlay-blocker{
  position:absolute;
  inset:0;
  z-index:1000;
  background:transparent;
}

/* ATC */
.panel{
  border:1px solid var(--border);
  background:var(--bg2);
  border-radius:6px;
}

.panel-body{
  padding:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.section-title{
  font-family:var(--cond);
  font-size:.7rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--accent-dim);
  padding:14px 18px 5px;
}
</style>
</head>

<body data-locked="true">

<!-- LOCK -->
<div class="toggle-container" id="lockToggle">
  <span class="lock-led" id="lockLed"></span>
  <span id="lockIcon">🔒</span>
  <span>Lock</span>
</div>

<header>
ATC & WEATHER DASHBOARD
</header>

<div class="topbar">
<div class="topbar-right">
<a class="btn" href="https://gniusweather.github.io/REGIONALDASHBOARD/" target="_blank">🌍 Regional</a>

<a class="btn" id="satBtn" href="https://www.weathernerds.org/satellite/?initsatsrc=On&initsatname=GOES-E&initsattype=ir&initcscheme=ir1&initimdimx=1050&initimdimy=601&initrange=13.250:-71.500:10.750:-66.250&initloop=False&initnframes=20&initlightningge=On&initlightninggw=Off&initltngfed=Off&initltngtoe=Off&initinterstates=On&initwarnings=On&initlatlon=Off&initascatb=Off&initascatc=Off&initascatambb=Off&initascatambc=Off&initsst=Off&initecens=Off&initgefs=Off" target="_blank">🛰 Satellite</a>

<a class="btn" href="https://curacao-airport.com/flights/?type=arrivals" target="_blank">🛬 Arrivals</a>
</div>
</div>

<div class="layout">

<div class="full">
<div class="section-title">ADSBexchange</div>
<div class="radar-box">
<iframe src="https://globe.adsbexchange.com/?lat=12&lon=-69&zoom=8"></iframe>
<div class="overlay-blocker"></div>
</div>
</div>

<div class="full">
<div class="section-title">Live ATC</div>
<div class="panel">
<div class="panel-body">
<a class="btn" href="https://www.liveatc.net/hlisten.php?mount=tncc3_twr&icao=tncc" target="_blank">🎧 TWR 118.300</a>
<a class="btn" href="https://www.liveatc.net/hlisten.php?mount=tncc3_rdr1&icao=tncc" target="_blank">🎧 APP/RDR</a>
</div>
</div>
</div>

<div class="col-6">
<div class="section-title">Windy Clouds</div>
<div class="radar-box">
<iframe src="https://embed.windy.com/embed2.html?lat=12&lon=-69&zoom=8&overlay=clouds"></iframe>
<div class="overlay-blocker"></div>
</div>
</div>

<div class="col-6">
<div class="section-title">Windy Radar</div>
<div class="radar-box">
<iframe src="https://embed.windy.com/embed2.html?lat=12.092&lon=-69.089&zoom=8&overlay=radar"></iframe>
<div class="overlay-blocker"></div>
</div>
</div>

</div>

<script>
const toggle=document.getElementById('lockToggle');
const led=document.getElementById('lockLed');
const icon=document.getElementById('lockIcon');

function setLock(locked){
document.body.dataset.locked=locked;
document.querySelectorAll('.overlay-blocker').forEach(el=>{
el.style.display=locked?'block':'none';
});
icon.textContent=locked?'🔒':'🔓';
locked?led.classList.remove('unlocked'):led.classList.add('unlocked');
}

setLock(true);

toggle.onclick=()=>{
setLock(document.body.dataset.locked!=='true');
};
</script>

</body>
</html>
