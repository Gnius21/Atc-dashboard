<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ATC & WEATHER DASHBOARD — Curaçao</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>

<style>
:root{
  --accent:#3fa9f5;
  --accent-bright:#72c4ff;
  --accent-dim:#1a5a8a;
  --accent-glow:rgba(63,169,245,0.16);
  --cyan:#00d4ff;
  --cyan-glow:rgba(0,212,255,0.18);
  --green:#39ff8a;
  --bg:#000;
  --bg2:#03060d;
  --border:rgba(63,169,245,0.11);
  --border-hi:rgba(63,169,245,0.28);
  --text:#b8d0ec;
  --muted:#354e6a;
  --mono:'Share Tech Mono', monospace;
  --orb:'Orbitron', monospace;
  --cond:'Barlow Condensed', sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{
  min-height:100%;
  background:#000;
  color:var(--text);
  font-family:var(--cond),system-ui,sans-serif;
}

/* ── GRID TEXTURE ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(63,169,245,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(63,169,245,0.04) 1px,transparent 1px);
  background-size:44px 44px;
  pointer-events:none;
  z-index:0;
}

/* ── TOP VIGNETTE GLOW ── */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,212,255,0.07) 0%,transparent 60%);
  pointer-events:none;
  z-index:0;
}

/* ── SCANLINE ── */
.scanline{
  position:fixed;
  left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,0.5),transparent);
  z-index:9999;
  pointer-events:none;
  animation:scan 9s linear infinite;
}
@keyframes scan{
  0%  {top:0;   opacity:0}
  3%  {opacity:.7}
  97% {opacity:.1}
  100%{top:100vh;opacity:0}
}

/* HEADER */
header{
  position:relative;
  z-index:10;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  height:56px;
  padding:0 12px;
  background:linear-gradient(180deg,rgba(0,20,40,0.95) 0%,rgba(3,6,13,0.98) 100%);
  border-bottom:1px solid var(--border-hi);
  overflow:hidden;
}
header::before,header::after{
  content:'';
  position:absolute;
  bottom:-1px;
  width:60px;
  height:2px;
  background:var(--cyan);
  box-shadow:0 0 12px var(--cyan);
}
header::before{left:0}
header::after{right:0}
.header-title{
  grid-column:2;
  font-family:var(--orb);
  font-weight:900;
  font-size:.78rem;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--accent-bright);
  text-shadow:0 0 24px rgba(114,196,255,0.45);
  white-space:nowrap;
  text-align:center;
  padding:0 8px;
}

/* LOCK */
.toggle-container{
  display:flex;
  align-items:center;
  gap:7px;
  padding:5px 10px;
  background:rgba(0,0,0,0.3);
  border:1px solid var(--border-hi);
  border-radius:3px;
  font-family:var(--mono);
  font-size:.68rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--accent-bright);
  cursor:pointer;
  transition:border-color .2s,box-shadow .2s;
}
.toggle-container:hover{
  border-color:var(--cyan);
  box-shadow:0 0 14px var(--cyan-glow);
}

.lock-led{
  width:7px;height:7px;
  border-radius:50%;
  background:var(--accent);
  transition:background .25s,box-shadow .25s;
}
.lock-led.unlocked{
  background:var(--cyan);
  box-shadow:0 0 8px var(--cyan);
  animation:blink 1.6s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* TOPBAR */
.topbar{
  position:relative;
  z-index:10;
  display:flex;
  justify-content:flex-end;
  padding:8px 16px;
  background:rgba(3,6,13,0.85);
  border-bottom:1px solid var(--border);
  gap:8px;
}
.topbar-right{display:flex;gap:8px}

/* BUTTONS */
.btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-family:var(--mono);
  font-size:.75rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--accent-bright);
  border:1px solid var(--border-hi);
  border-radius:3px;
  background:var(--accent-glow);
  padding:7px 14px;
  text-decoration:none;
  transition:border-color .18s,background .18s,box-shadow .18s,color .18s,transform .15s;
}
.btn:hover{
  border-color:var(--cyan);
  background:rgba(0,212,255,0.1);
  color:var(--cyan);
  box-shadow:0 0 14px var(--cyan-glow);
  transform:translateY(-1px);
}

/* LAYOUT */
.layout{
  position:relative;
  z-index:5;
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:12px;
  padding:12px 16px 32px;
}

.full{grid-column:1/-1}
.col-6{grid-column:span 6}

/* RADAR */
.radar-box{
  position:relative;
  width:100%;
  height:360px;
  border:1px solid var(--border-hi);
  border-radius:5px;
  overflow:hidden;
  background:#000;
  box-shadow:0 0 0 1px rgba(0,212,255,0.06), inset 0 0 60px rgba(0,0,0,0.7);
}
.radar-box::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:5px;
  background:
    linear-gradient(135deg,var(--cyan) 0%,transparent 12px) top left    /12px 12px no-repeat,
    linear-gradient(225deg,var(--cyan) 0%,transparent 12px) top right   /12px 12px no-repeat,
    linear-gradient(315deg,var(--cyan) 0%,transparent 12px) bottom right/12px 12px no-repeat,
    linear-gradient( 45deg,var(--cyan) 0%,transparent 12px) bottom left /12px 12px no-repeat;
  opacity:.2;
  pointer-events:none;
  z-index:5;
}

.radar-box iframe{
  position:absolute;
  inset:0;
  width:100%;height:100%;
  border:0;
}

.overlay-blocker{
  position:absolute;
  inset:0;
  z-index:1000;
  background:transparent;
}

/* ATC */
.panel{
  border:1px solid var(--border);
  background:var(--bg2);
  border-radius:5px;
  overflow:hidden;
}

.panel-body{
  padding:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.section-title{
  display:flex;
  align-items:center;
  gap:10px;
  font-family:var(--mono);
  font-size:.65rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--muted);
  padding:14px 16px 6px;
}
.section-title::before{
  content:'';
  display:inline-block;
  width:3px;height:13px;
  background:var(--cyan);
  box-shadow:0 0 8px var(--cyan);
  border-radius:2px;
  flex-shrink:0;
}
.section-title::after{
  content:'';
  flex:1;
  height:1px;
  background:linear-gradient(90deg,var(--border-hi),transparent);
}

/* CLOCK */
.clock-display{
  display:flex;
  gap:6px;
  align-items:center;
}
.clock-block{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:3px 8px;
  background:rgba(0,0,0,0.3);
  border:1px solid var(--border);
  border-radius:3px;
  line-height:1.1;
}
.clock-time{
  font-family:var(--orb);
  font-size:.72rem;
  font-weight:700;
  color:var(--cyan);
  text-shadow:0 0 14px rgba(0,212,255,0.5);
  letter-spacing:.06em;
}
.clock-label{
  font-family:var(--mono);
  font-size:.46rem;
  letter-spacing:.15em;
  color:var(--muted);
  text-transform:uppercase;
  margin-top:2px;
}

/* Entry animations */
.layout > *{
  animation:fadeUp .45s ease both;
}
.layout > *:nth-child(1){animation-delay:.04s}
.layout > *:nth-child(2){animation-delay:.10s}
.layout > *:nth-child(3){animation-delay:.16s}
.layout > *:nth-child(4){animation-delay:.22s}
.layout > *:nth-child(5){animation-delay:.28s}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to  {opacity:1;transform:translateY(0)}
}
</style>

</head>

<body data-locked="true">

<div class="scanline"></div>

<header>
  <div class="clock-display">
    <div class="clock-block">
      <span class="clock-time" id="clockLocal">--:--:--</span>
      <span class="clock-label">Local (AST)</span>
    </div>
    <div class="clock-block">
      <span class="clock-time" id="clockUtc">--:--:--</span>
      <span class="clock-label">UTC / Zulu</span>
    </div>
  </div>
  <span class="header-title">ATC &amp; WEATHER DASHBOARD</span>
  <div style="display:flex;justify-content:flex-end">
    <div class="toggle-container" id="lockToggle">
      <span class="lock-led" id="lockLed"></span>
      <span id="lockIcon">🔒</span>
      <span>Lock</span>
    </div>
  </div>
</header>

<div class="topbar">
<div class="topbar-right">
<a class="btn" href="https://gniusweather.github.io/REGIONALDASHBOARD/" target="_blank">🌍 Regional</a>

<a class="btn" id="satBtn" href="https://www.weathernerds.org/satellite/?initsatsrc=On&initsatname=GOES-E&initsattype=ir&initcscheme=ir1&initimdimx=1050&initimdimy=601&initrange=13.250:-71.500:10.750:-66.250&initloop=False&initnframes=20&initlightningge=On&initlightninggw=Off&initltngfed=Off&initltngtoe=Off&initinterstates=On&initwarnings=On&initlatlon=Off&initascatb=Off&initascatc=Off&initascatambb=Off&initascatambc=Off&initsst=Off&initecens=Off&initgefs=Off" target="_blank">🛰 Satellite</a>

<a class="btn" href="https://curacao-airport.com/flights/?type=arrivals" target="_blank">🛬 Arrivals</a>

</div>
</div>

<div class="layout">

<div class="full">
<div class="section-title">ADSBexchange</div>
<div class="radar-box">
<iframe src="https://globe.adsbexchange.com/?lat=12&lon=-69&zoom=8"></iframe>
<div class="overlay-blocker"></div>
</div>
</div>

<div class="full">
<div class="section-title">Live ATC</div>
<div class="panel">
<div class="panel-body">
<a class="btn" href="https://www.liveatc.net/hlisten.php?mount=tncc3_twr&icao=tncc" target="_blank">🎧 TWR 118.300</a>
<a class="btn" href="https://www.liveatc.net/hlisten.php?mount=tncc3_rdr1&icao=tncc" target="_blank">🎧 APP/RDR</a>
</div>
</div>
</div>

<div class="col-6">
<div class="section-title">Windy Clouds</div>
<div class="radar-box">
<iframe src="https://embed.windy.com/embed2.html?lat=12&lon=-69&zoom=8&overlay=clouds"></iframe>
<div class="overlay-blocker"></div>
</div>
</div>

<div class="col-6">
<div class="section-title">Windy Radar</div>
<div class="radar-box">
<iframe src="https://embed.windy.com/embed2.html?lat=12.092&lon=-69.089&zoom=8&overlay=radar"></iframe>
<div class="overlay-blocker"></div>
</div>
</div>

</div>

<script>
/* ── Clocks ── */
function updateClocks(){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  // UTC
  document.getElementById('clockUtc').textContent=
    `${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}:${pad(now.getUTCSeconds())}`;
  // Local (Curaçao is AST = UTC-4, no DST)
  const ast=new Date(now.toLocaleString('en-US',{timeZone:'America/Curacao'}));
  document.getElementById('clockLocal').textContent=
    `${pad(ast.getHours())}:${pad(ast.getMinutes())}:${pad(ast.getSeconds())}`;
}
setInterval(updateClocks,1000);
updateClocks();

const toggle=document.getElementById('lockToggle');
const led=document.getElementById('lockLed');
const icon=document.getElementById('lockIcon');

function setLock(locked){
document.body.dataset.locked=locked;
document.querySelectorAll('.overlay-blocker').forEach(el=>{
el.style.display=locked?'block':'none';
});
icon.textContent=locked?'🔒':'🔓';
locked?led.classList.remove('unlocked'):led.classList.add('unlocked');
}

setLock(true);

toggle.onclick=()=>{
setLock(document.body.dataset.locked!=='true');
};
</script>

</body>
</html>
