<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATC Dashboard</title>

<style>
  body {
    margin:0;
    background:#020305;
    color:#e6e6e6;
    font-family:-apple-system, BlinkMacSystemFont, system-ui;
    overflow-y: scroll; /* FORCE SCROLLBAR */
    scrollbar-width: thin;
  }

  /* CUSTOM SCROLLBAR (Chrome, Edge, Safari) */
  body::-webkit-scrollbar {
    width: 12px;
  }

  body::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.05);
  }

  body::-webkit-scrollbar-thumb {
    background: #3fa9f5;
    border-radius: 10px;
    box-shadow: 0 0 10px #3fa9f5;
  }

  body::-webkit-scrollbar-thumb:hover {
    background: #6bc4ff;
  }

  /* DARK GLASS */
  .glass {
    background:rgba(15,17,25,0.55);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.06);
    box-shadow:0 0 22px rgba(0,0,0,0.45);
  }

  header {
    padding:16px;
    text-align:center;
    background:rgba(10,12,18,0.7);
    backdrop-filter:blur(12px);
    color:#3fa9f5;
    font-size:1.2rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    border-bottom:1px solid rgba(255,255,255,0.06);
  }

  .btn {
    display:block;
    background:rgba(63,169,245,0.85);
    color:#000;
    padding:12px;
    border-radius:10px;
    text-align:center;
    font-weight:600;
    font-size:0.9rem;
    text-decoration:none;
    box-shadow:0 0 12px rgba(63,169,245,0.35);
  }

  .panel {
    border-radius:16px;
    margin:12px;
    padding:12px;
  }

  .tools-row {
    display:flex;
    gap:10px;
  }

  .tools-row .btn {
    flex:1;
  }

  .section-title {
    font-size:0.8rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:#3fa9f5;
    margin:14px 0 6px 16px;
  }

  .section-title a {
    color:#3fa9f5;
    text-decoration:none;
  }

  .radar-box {
    position:relative;
    width:100%;
    height:360px;
    border-radius:16px;
    overflow:hidden;
    margin:12px;
    border:1px solid rgba(255,255,255,0.06);
    background:#000;
  }

  .radar-box iframe {
    width:100%;
    height:100%;
    border:none;
    pointer-events:auto;
    touch-action:none; /* disable scroll + zoom */
  }

  .arrivals-box {
    height:420px;
    margin:12px;
    border-radius:16px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.06);
    background:rgba(15,17,25,0.55);
    backdrop-filter:blur(14px);
  }

  .arrivals-box iframe {
    width:100%;
    height:100%;
    border:none;
    pointer-events:auto;
  }

  @media (min-width:900px){
    .radar-box { height:500px; }
    .arrivals-box { height:600px; }
  }
</style>
</head>

<body>

<header class="glass">ATC Dashboard</header>

<!-- BUTTON ROW -->
<div class="panel glass tools-row">
  <a class="btn" href="https://gniusweather.github.io/REGIONALDASHBOARD/" target="_blank">🌍 Regional</a>
  <a class="btn" href="https://www.ventusky.com" target="_blank">🌧 Harmonie</a>
  <a class="btn" 
     href="https://www.weathernerds.org/satellite/?initsatsrc=On&initsatname=GOES-E&initsattype=ir&initcscheme=ir1&initimdimx=1050&initimdimy=559&initrange=13.000:-71.250:11.000:-66.750&initloop=False&initnframes=20&initlightningge=On&initlightninggw=On&initltngfed=Off&initltngtoe=Off&initinterstates=On&initwarnings=On&initlatlon=Off&initascatb=Off&initascatc=Off&initascatambb=Off&initascatambc=Off&initsst=On&initecens=2026040318&initgefs=Off"
     target="_blank">🛰 Satellite</a>
</div>

<!-- ADSBEXCHANGE -->
<div class="section-title">
  <a href="https://globe.adsbexchange.com/?lat=12.1889&lon=-68.9598&zoom=9" target="_blank">ADSBexchange Radar</a>
</div>
<div class="radar-box glass">
  <iframe src="https://globe.adsbexchange.com/?lat=12.1889&lon=-68.9598&zoom=9"></iframe>
</div>

<!-- WINDY -->
<div class="section-title">
  <a href="https://www.windy.com/?11.904,-69.079,7" target="_blank">Windy Radar</a>
</div>
<div class="radar-box glass">
  <iframe src="https://embed.windy.com/embed2.html?lat=11.904&lon=-69.079&zoom=7&overlay=radar"></iframe>
</div>

<!-- ARRIVALS -->
<div class="section-title">Arrivals</div>
<div class="arrivals-box glass">
  <iframe src="https://curacao-airport.com/flights/?type=arrivals"></iframe>
</div>

</body>
</html>
