<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATC Dashboard</title>

<!-- AdSense Verification Script -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8809941591993194"
     crossorigin="anonymous"></script>

<style>
  body {
    margin:0;
    background:#05060a;
    color:#e6e6e6;
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui;
    -webkit-tap-highlight-color: transparent;
  }

  header {
    padding:16px;
    text-align:center;
    background:#0b0d13;
    color:#3fa9f5;
    font-size:1.2rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    border-bottom:1px solid #11131a;
  }

  /* WEATHER ROW */
  .top-weather {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:12px;
    padding:12px;
    background:#0b0d13;
    border-radius:14px;
    border:1px solid #11131a;
  }

  .weather-item {
    display:flex;
    flex-direction:column;
    text-align:center;
    min-width:60px;
  }

  .weather-main {
    font-size:1rem;
    color:#3fa9f5;
    font-weight:600;
  }

  .weather-sub {
    font-size:0.7rem;
    color:#9bbcd1;
  }

  .btn {
    display:block;
    background:#3fa9f5;
    color:#000;
    padding:10px;
    border-radius:8px;
    text-align:center;
    font-weight:600;
    font-size:0.85rem;
    text-decoration:none;
  }

  .panel {
    background:#0b0d13;
    border-radius:14px;
    margin:10px;
    padding:10px;
    border:1px solid #11131a;
  }

  .tools-row {
    display:flex;
    gap:8px;
  }

  .tools-row .btn {
    flex:1;
    margin:0;
  }

  .section-title {
    font-size:0.8rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:#3fa9f5;
    margin:10px 0 6px 14px;
  }

  .section-title a {
    color:#3fa9f5;
    text-decoration:none;
  }

  .radar-lock {
    width:100%;
    height:360px;
    background:#000;
    border-radius:14px;
    overflow:hidden;
    margin:10px;
    border:1px solid #11131a;
  }

  .radar-lock iframe {
    width:100%;
    height:100%;
    pointer-events:none;
  }

  /* ARRIVALS — UNLOCKED */
  .arrivals-unlocked iframe {
    width:100%;
    height:100%;
    border:none;
    pointer-events:auto; /* FULL INTERACTION */
  }

  .ad-container {
    margin:12px;
    padding:10px;
    background:#0b0d13;
    border-radius:14px;
    border:1px solid #11131a;
    text-align:center;
    color:#777;
    font-size:0.8rem;
  }

  .flights {
    padding:10px;
  }

  .col {
    background:#0b0d13;
    border-radius:14px;
    border:1px solid #11131a;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    height:420px;
  }

  .col h3 {
    text-align:center;
    color:#3fa9f5;
    margin:6px 0;
    font-size:0.85rem;
    letter-spacing:0.1em;
  }

  @media (min-width:900px){
    .col { height:600px; }
    .radar-lock { height:500px; }
  }
</style>
</head>

<body>

<header>ATC Dashboard</header>

<!-- WEATHER ROW -->
<a href="https://www.meteoblue.com/en/weather/week/curacao_netherlands-antilles_3513090" target="_blank" style="text-decoration:none;">
  <div class="top-weather">

    <div class="weather-item">
      <div class="weather-main" id="temp">--°C</div>
      <div class="weather-sub">Temp</div>
    </div>

    <div class="weather-item">
      <div class="weather-main" id="wind">--</div>
      <div class="weather-sub">Wind</div>
    </div>

    <div class="weather-item">
      <div class="weather-main" id="humidity">--%</div>
      <div class="weather-sub">Humidity</div>
    </div>

    <div class="weather-item">
      <div class="weather-main" id="condition">--</div>
      <div class="weather-sub">Cond</div>
    </div>

  </div>
</a>

<script>
// LIVE WEATHER
fetch("https://api.open-meteo.com/v1/forecast?latitude=12.1889&longitude=-68.9598&current_weather=true&hourly=relativehumidity_2m&timezone=auto")
  .then(r => r.json())
  .then(data => {

    const t = data.current_weather.temperature;
    const w = data.current_weather.windspeed;
    const d = data.current_weather.winddirection;
    const h = data.hourly.relativehumidity_2m[0];
    const code = data.current_weather.weathercode;

    const dirs = ["N","NE","E","SE","S","SW","W","NW"];
    const compass = dirs[Math.round(d / 45) % 8];

    const conditions = {
      0:"Clear",1:"Clear",2:"Partly",3:"Cloudy",
      45:"Fog",48:"Fog",
      51:"Drizzle",53:"Drizzle",55:"Drizzle",
      61:"Rain",63:"Rain",65:"Rain",
      80:"Showers",81:"Showers",82:"Showers",
      95:"Storm",96:"Storm",99:"Storm"
    };

    document.getElementById("temp").innerText = t + "°C";
    document.getElementById("wind").innerText = w + " " + compass;
    document.getElementById("humidity").innerText = h + "%";
    document.getElementById("condition").innerText = conditions[code] || "—";
  });
</script>

<!-- AD SLOT 1 -->
<div class="ad-container">
  Ad Space (Top)
</div>

<!-- REGIONAL WEATHER / HARMONIE / SATELLITE ROW -->
<div class="panel tools-row">

  <a class="btn" 
     href="https://gniusweather.github.io/REGIONALDASHBOARD/"
     target="_blank">🌍 Regional</a>

  <a class="btn" 
     href="https://www.ventusky.com/precipitation-map/3-hours#p=11.72;-69.01;8&m=harmonie_car"
     target="_blank">🌧 Harmonie</a>

  <a class="btn" 
     href="https://www.weathernerds.org/satellite/?initsatsrc=On&initsatname=GOES-E"
     target="_blank">🛰 Satellite</a>

</div>

<!-- ADSBexchange Radar -->
<div class="section-title">
  <a href="https://globe.adsbexchange.com" target="_blank">ADSBexchange Radar</a>
</div>
<div class="radar-lock">
  <iframe src="https://globe.adsbexchange.com"></iframe>
</div>

<!-- ATC -->
<div class="section-title">ATC</div>
<div class="panel">
  <a class="btn" href="https://www.liveatc.net/hlisten.php?mount=tncc3_twr&icao=tncc" target="_blank">▶ Tower 118.300</a>
  <a class="btn" href="https://www.liveatc.net/hlisten.php?mount=tncc3_rdr1&icao=tncc" target="_blank">▶ Terminal / Radar</a>
</div>

<!-- AD SLOT 2 -->
<div class="ad-container">
  Ad Space (Middle)
</div>

<!-- WINDY RADAR -->
<div class="section-title">
  <a href="https://www.windy.com/-Weather-radar-radar?radar,11.904,-69.079,8,p:radiosonde" target="_blank">
    Windy Radar
  </a>
</div>

<div class="radar-lock">
  <iframe 
    src="https://embed.windy.com/embed2.html?lat=11.904&lon=-69.079&zoom=8&overlay=radar"
    scrolling="no">
  </iframe>
</div>

<!-- ARRIVALS (UNLOCKED) -->
<div class="section-title">Arrivals</div>
<div class="flights arrivals-unlocked">
  <div class="col">
    <h3>Arrivals</h3>
    <iframe src="https://curacao-airport.com/flights/?type=arrivals"></iframe>
  </div>
</div>

<!-- AD SLOT 3 -->
<div class="ad-container">
  Ad Space (Bottom)
</div>

</body>
</html>
