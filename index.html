<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🇦🇼🇧🇶🇨🇼 ATC & WEATHER DASHBOARD</title>

<style>
  body {
    margin:0;
    background:#020305;
    color:#e6e6e6;
    font-family:-apple-system, BlinkMacSystemFont, system-ui;
    overflow-y: scroll;
    scrollbar-width: thin;
  }

  body::-webkit-scrollbar { width: 12px; }
  body::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
  body::-webkit-scrollbar-thumb {
    background: #3fa9f5;
    border-radius: 10px;
    box-shadow: 0 0 10px #3fa9f5;
  }

  .glass {
    background:rgba(15,17,25,0.55);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.06);
    box-shadow:0 0 22px rgba(0,0,0,0.45);
  }

  header {
    padding:16px;
    text-align:center;
    background:rgba(10,12,18,0.7);
    color:#3fa9f5;
    font-size:1.2rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    border-bottom:1px solid rgba(255,255,255,0.06);
  }

  /* Forecast strip */
  .forecast-strip {
    margin:12px;
    padding:12px;
    border-radius:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
  }

  .forecast-day {
    flex:1;
    text-align:center;
    background:rgba(255,255,255,0.04);
    padding:6px;
    border-radius:10px;
  }

  /* Dust indicator */
  .dust-badge {
    margin:12px;
    padding:10px;
    border-radius:12px;
    text-align:center;
    font-weight:600;
    font-size:0.9rem;
  }

  .dust-clear { background:#0f5132; color:#d1e7dd; }
  .dust-light { background:#664d03; color:#fff3cd; }
  .dust-dusty { background:#7f3d00; color:#ffe5d0; }
  .dust-heavy { background:#842029; color:#f8d7da; }

  /* UV Index */
  .uv-badge {
    margin:12px;
    padding:12px;
    border-radius:12px;
    text-align:center;
    font-weight:600;
    font-size:1rem;
  }

  .uv-low { background:#0f5132; color:#d1e7dd; }
  .uv-mod { background:#664d03; color:#fff3cd; }
  .uv-high { background:#7f3d00; color:#ffe5d0; }
  .uv-vhigh { background:#842029; color:#f8d7da; }
  .uv-extreme { background:#4b0082; color:#f3e8ff; }

  .toggle-container {
    position: fixed;
    top: 18px;
    right: 18px;
    padding: 10px 14px;
    font-size: 20px;
    border-radius: 12px;
    cursor: pointer;
    z-index: 9999;
    color: #3fa9f5;
    background: rgba(15,17,25,0.85);
    box-shadow: 0 0 12px rgba(63,169,245,0.35);
  }

  .btn {
    display:block;
    background:rgba(63,169,245,0.85);
    color:#000;
    padding:12px;
    border-radius:10px;
    text-align:center;
    font-weight:600;
    font-size:0.9rem;
    text-decoration:none;
    box-shadow:0 0 12px rgba(63,169,245,0.35);
  }

  .panel {
    border-radius:16px;
    margin:12px;
    padding:12px;
  }

  .tools-row {
    display:flex;
    gap:10px;
  }

  .section-title {
    font-size:0.8rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:#3fa9f5;
    margin:14px 0 6px 16px;
  }

  .radar-box {
    position:relative;
    width:100%;
    height:360px;
    border-radius:16px;
    overflow:hidden;
    margin:12px;
    border:1px solid rgba(255,255,255,0.06);
    background:#000;
  }

  .radar-box iframe {
    width:100%;
    height:100%;
    border:none;
  }

  .radar-overlay {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:10;
    background:transparent;
  }

  .radar-overlay.hidden { display:none; }

  @media (min-width:900px){
    .radar-box { height:500px; }
  }
</style>
</head>

<body>

<header class="glass">🇦🇼🇧🇶🇨🇼 ATC & WEATHER DASHBOARD</header>

<!-- 3-DAY FORECAST STRIP -->
<div id="forecastStrip" class="forecast-strip glass">
  <div style="display:flex; flex-direction:column;">
    <div style="font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase; color:#3fa9f5;">
      3‑Day Forecast
    </div>
    <div id="forecastLocation" style="font-size:0.7rem; opacity:0.8;">Loading…</div>
  </div>

  <div style="display:flex; gap:10px; flex:1; justify-content:space-between;">
    <div class="forecast-day">
      <div id="icon1" style="font-size:1.2rem;">–</div>
      <div id="temp1" style="font-size:0.8rem;">–</div>
      <div id="label1" style="font-size:0.7rem; opacity:0.8;">Day 1</div>
    </div>

    <div class="forecast-day">
      <div id="icon2" style="font-size:1.2rem;">–</div>
      <div id="temp2" style="font-size:0.8rem;">–</div>
      <div id="label2" style="font-size:0.7rem; opacity:0.8;">Day 2</div>
    </div>

    <div class="forecast-day">
      <div id="icon3" style="font-size:1.2rem;">–</div>
      <div id="temp3" style="font-size:0.8rem;">–</div>
      <div id="label3" style="font-size:0.7rem; opacity:0.8;">Day 3</div>
    </div>
  </div>
</div>

<!-- DUST / HAZE INDICATOR -->
<div id="dustBox" class="dust-badge glass">Loading dust levels…</div>

<!-- CURRENT UV INDEX -->
<div id="uvBox" class="uv-badge glass">Loading UV Index…</div>

<div class="toggle-container glass" onclick="toggleRadarLock()">🔒</div>

<!-- TOP TABS -->
<div class="panel glass tools-row">
  <a class="btn" href="https://gniusweather.github.io/REGIONALDASHBOARD/" target="_blank">🌍 Regional</a>
  <a class="btn" href="https://www.ventusky.com/precipitation-map/3-hours" target="_blank">🌦 Weather</a>
  <a class="btn" href="https://www.weathernerds.org/satellite/" target="_blank">🛰 Satellite</a>
  <a class="btn" href="https://curacao-airport.com/flights/?type=arrivals" target="_blank">🛬 Arrivals</a>
</div>

<!-- ADSBEXCHANGE -->
<div class="section-title">
  <a href="https://globe.adsbexchange.com/?lat=12.1889&lon=-68.9598&zoom=9" target="_blank">ADSBexchange Radar</a>
</div>
<div class="radar-box glass">
  <iframe src="https://globe.adsbexchange.com/?lat=12.1889&lon=-68.9598&zoom=9"></iframe>
  <div class="radar-overlay"></div>
</div>

<!-- LIVE ATC -->
<div class="section-title">Live ATC</div>
<div class="panel glass">
  <a class="btn" href="https://www.liveatc.net/hlisten.php?mount=tncc3_twr&icao=tncc" target="_blank">🎧 Tower 118.300</a>
  <a class="btn" href="https://www.liveatc.net/hlisten.php?mount=tncc3_rdr1&icao=tncc" target="_blank">🎧 Radar / Approach</a>
</div>

<!-- WINDY -->
<div class="section-title">
  <a href="https://www.windy.com/?11.904,-69.079,7" target="_blank">Windy Radar</a>
</div>
<div class="radar-box glass">
  <iframe src="https://embed.windy.com/embed2.html?lat=11.904&lon=-69.079&zoom=7&overlay=radar"></iframe>
  <div class="radar-overlay"></div>
</div>

<!-- VENTUSKY WINDOW -->
<div class="section-title">
  <a href="https://www.ventusky.com/precipitation-map/3-hours#p=11.70;-69.09;8&t=20260409/0300&m=harmonie_car&w=off" target="_blank">
    Ventusky Model Viewer
  </a>
</div>
<div class="radar-box glass">
  <iframe src="https://www.ventusky.com/precipitation-map/3-hours#p=11.70;-69.09;8&t=20260409/0300&m=harmonie_car&w=off"></iframe>
  <div class="radar-overlay"></div>
</div>

<script>
let radarLocked = true;

function toggleRadarLock() {
  radarLocked = !radarLocked;
  document.querySelectorAll(".radar-overlay").forEach(o =>
    o.classList.toggle("hidden", !radarLocked)
  );
  document.querySelector(".toggle-container").textContent = radarLocked ? "🔒" : "🔓";
}

/* WEATHER ICONS */
function iconFromWeatherCode(code) {
  if ([0].includes(code)) return "☀️";
  if ([1,2].includes(code)) return "🌤";
  if ([3].includes(code)) return "☁️";
  if ([45,48].includes(code)) return "🌫";
  if ([51,53,55].includes(code)) return "🌦";
  if ([61,63,65].includes(code)) return "🌧";
  if ([80,81,82].includes(code)) return "🌧";
  if ([95,96,99].includes(code)) return "⛈";
  return "🌤";
}

/* LOAD FORECAST */
async function loadForecast(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`;

  const res = await fetch(url);
  const data = await res.json();
  const d = data.daily;

  const labels = ["Today", "Tomorrow", new Date(d.time[2]).toLocaleDateString("en-US", { weekday: "short" })];

  document.getElementById("icon1").textContent = iconFromWeatherCode(d.weathercode[0]);
  document.getElementById("icon2").textContent = iconFromWeatherCode(d.weathercode[1]);
  document.getElementById("icon3").textContent = iconFromWeatherCode(d.weathercode[2]);

  document.getElementById("temp1").textContent = `${d.temperature_2m_max[0]}° / ${d.temperature_2m_min[0]}°`;
  document.getElementById("temp2").textContent = `${d.temperature_2m_max[1]}° / ${d.temperature_2m_min[1]}°`;
  document.getElementById("temp3").textContent = `${d.temperature_2m_max[2]}° / ${d.temperature_2m_min[2]}°`;

  document.getElementById("label1").textContent = labels[0];
  document.getElementById("label2").textContent = labels[1];
  document.getElementById("label3").textContent = labels[2];

  document.getElementById("forecastLocation").textContent = `Lat ${lat.toFixed(2)}, Lon ${lon.toFixed(2)}`;
}

/* LOAD DUST / HAZE */
async function loadDust(lat, lon) {
  const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&hourly=pm10,dust&timezone=auto`;

  const res = await fetch(url);
  const data = await res.json();

  const pm10 = data.hourly.pm10[0];
  const dust = data.hourly.dust[0];

  const box = document.getElementById("dustBox");

  let level = "";
  let cls = "";

  if (dust < 20) { level = "🟢 Clear"; cls = "dust-clear"; }
  else if (dust < 40) { level = "🟡 Light Haze"; cls = "dust-light"; }
  else if (dust < 80) { level = "🟠 Dusty"; cls = "dust-dusty"; }
  else { level = "🔴 Heavy Dust"; cls = "dust-heavy"; }

  box.textContent = `${level} — Dust: ${dust.toFixed(1)} µg/m³ • PM10: ${pm10.toFixed(1)} µg/m³`;
  box.className = `dust-badge glass ${cls}`;
}

/* LOAD CURRENT UV INDEX */
async function loadUV(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=uv_index&timezone=auto`;

  const res = await fetch(url);
  const data = await res.json();

  const uv = data.hourly.uv_index[0];
  const box = document.getElementById("uvBox");

  let label = "";
  let cls = "";

  if (uv <= 2) { label = "🟢 Low"; cls = "uv-low"; }
  else if (uv <= 5) { label = "🟡 Moderate"; cls = "uv-mod"; }
  else if (uv <= 7) { label = "🟠 High"; cls = "uv-high"; }
  else if (uv <= 10) { label = "🔴 Very High"; cls = "uv-vhigh"; }
  else { label = "🟣 Extreme"; cls = "uv-extreme"; }

  box.textContent = `${label} — UV Now: ${uv.toFixed(1)}`;
  box.className = `uv-badge glass ${cls}`;
}

/* INIT */
function initWeather() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        loadForecast(lat, lon);
        loadDust(lat, lon);
        loadUV(lat, lon);
      },
      () => {
        loadForecast(12.1889, -68.9598);
        loadDust(12.1889, -68.9598);
        loadUV(12.1889, -68.9598);
      }
    );
  } else {
    loadForecast(12.1889, -68.9598);
    loadDust(12.1889, -68.9598);
    loadUV(12.1889, -68.9598);
  }
}

document.addEventListener("DOMContentLoaded", initWeather);
</script>

</body>
</html>
